<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 관리 · 동해 카페 관리자</title>

    <!-- 파비콘 — 루트의 favicon.svg 를 절대경로로 가리켜 모든 깊이에서 동일하게 동작한다 -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- 1단계 공유 자원 (전역 변수 · 리셋 · 공통 컴포넌트) -->
    <link rel="stylesheet" href="../../css/variables.css" />
    <!-- 이 페이지 전용 스타일 -->
    <link rel="stylesheet" href="./list.css" />

    <!-- defer 는 순서를 보장한다: data.js → utils.js → 페이지 스크립트 -->
    <script defer src="../../js/data.js"></script>
    <script defer src="../../js/utils.js"></script>
    <script defer src="./list.js"></script>
  </head>
  <body>
    <!-- 상단 관리자 헤더 (2단계 .admin-top 을 그대로 복사, 내비 링크만 3개로 확장) -->
    <header class="admin-top">
      <div class="container admin-top__inner">
        <a class="admin-top__brand" href="../index.html">
          🌊 동해 카페 <span>관리자</span>
        </a>
        <nav class="admin-top__nav">
          <a class="btn btn--ghost" href="../index.html">대시보드</a>
          <a class="btn btn--ghost" href="../menus/list.html">메뉴 관리</a>
          <a class="btn btn--ghost" href="./list.html" aria-current="page">주문 관리</a>
          <!-- 손님(고객) 화면으로 빠져나가는 링크 — btn--outline 로 위 3개와 살짝 구분 -->
          <span class="admin-top__sep" aria-hidden="true">|</span>
          <a class="btn btn--outline" href="../../index.html">손님 페이지 보기</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <!-- 페이지 제목 -->
      <div class="page-head">
        <div>
          <p class="breadcrumb">관리자 · 주문 관리</p>
          <h1 class="page-head__title">밀려오는 주문</h1>
          <p class="page-head__sub">
            접수된 주문을 확인하고 제조 상태를 넘깁니다.
          </p>
        </div>
        <a class="btn btn--outline" href="../index.html">← 대시보드</a>
      </div>

      <!-- 상태 필터 (2단계 .toolbar / .filter--on 패턴을 상태 필터로 응용) -->
      <section class="toolbar glass">
        <div class="toolbar__filters" data-filters role="group" aria-label="주문 상태 필터">
          <!-- 상태 버튼은 list.js 가 렌더 -->
        </div>
      </section>

      <!-- 주문 목록 (list.js 가 렌더) -->
      <section data-orders aria-live="polite">
        <!-- list.js 가 렌더 -->
      </section>
    </main>
  </body>
</html>
