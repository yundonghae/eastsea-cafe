<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메뉴 · 동해 카페</title>

    <!-- 1단계 공유 자원 (전역 변수 · 리셋 · 공통 컴포넌트) -->
    <link rel="stylesheet" href="../css/variables.css" />
    <!-- 이 페이지 전용 스타일 -->
    <link rel="stylesheet" href="./list.css" />

    <!-- defer 는 순서를 보장한다: data.js → utils.js → 페이지 스크립트 -->
    <script defer src="../js/data.js"></script>
    <script defer src="../js/utils.js"></script>
    <!-- 모바일 헤더 햄버거 토글 (고객 7개 페이지 공용) -->
    <script defer src="../js/header.js"></script>
    <script defer src="./list.js"></script>
  </head>
  <body>
    <!-- 고객용 헤더 (관리자의 .admin-top 과 구분되는 .site-header) -->
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="site-header__logo" href="../index.html">🌊 동해 카페</a>

        <nav class="site-header__nav">
          <!--
            접히는 링크 묶음 — 데스크톱에서는 가로로 펼쳐지고,
            모바일에서는 햄버거로 여는 드롭다운 패널이 된다 (js/header.js 가 data-open 토글).
          -->
          <div class="site-header__links" id="site-nav-links" data-nav-panel>
            <a class="btn btn--ghost" href="../index.html">홈</a>
            <a class="btn btn--ghost" href="./list.html" aria-current="page">메뉴</a>
            <a class="btn btn--ghost" href="../my/index.html">마이페이지</a>
            <a class="btn btn--ghost" href="../orders/list.html">주문내역</a>

            <!-- 관리자 진입: 대시보드가 로드될 때 키를 물으므로 여기서는 이동만 한다 -->
            <a class="btn btn--ghost btn--sm" href="../admin/index.html" title="관리자 페이지">
              🔐 관리자
            </a>
          </div>

          <!-- 장바구니: 모바일에서도 항상 보인다 (data-cart-badge 는 CafeUtils 가 채운다) -->
          <a class="site-header__cart" href="../basket/list.html">
            <span aria-hidden="true">🧺</span>
            <span class="sr-only">장바구니</span>
            <span class="site-header__cart-count" data-cart-badge hidden>0</span>
          </a>

          <!-- 햄버거 버튼 — 모바일에서만 보인다 (CSS 로 제어) -->
          <button
            class="site-header__toggle"
            type="button"
            data-nav-toggle
            aria-label="메뉴 열기"
            aria-expanded="false"
            aria-controls="site-nav-links"
          >
            <span aria-hidden="true">☰</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="container">
      <!-- 페이지 제목 (2단계 page-head 패턴 재사용) -->
      <div class="page-head">
        <div>
          <p class="breadcrumb">동해 카페 · 메뉴</p>
          <h1 class="page-head__title">오늘의 바다</h1>
          <p class="page-head__sub">
            수평선 너머에서 건져 올린 한 잔을 고르세요.
          </p>
        </div>
      </div>

      <!-- 필터 · 검색 (.glass 재사용) -->
      <section class="toolbar glass">
        <div class="toolbar__filters" data-filters role="group" aria-label="카테고리 필터">
          <!-- 카테고리 버튼은 list.js 가 렌더 -->
        </div>
        <div class="toolbar__search field">
          <label class="sr-only" for="search">메뉴 검색</label>
          <input
            class="input"
            id="search"
            type="search"
            data-search
            placeholder="마시고 싶은 바다를 검색해 보세요"
            autocomplete="off"
          />
        </div>
      </section>

      <!-- 메뉴 카드 그리드 -->
      <section class="grid" data-grid aria-live="polite">
        <!-- list.js 가 렌더 -->
      </section>
    </main>
  </body>
</html>
